version: 2

project_name: rememberize-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: rememberize
    binary: rememberize
    main: ./cmd/rememberize
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: rememberize
    name_template: >-
      rememberize_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot-{{.ShortCommit}}"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: captured-ventures
    name: rememberize-cli
  draft: false
  prerelease: auto
  mode: replace
  name_template: "v{{ .Version }}"

brews:
  - name: rememberize
    repository:
      owner: captured-ventures
      name: homebrew-rememberize
      branch: main
      token: "{{ .Env.GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://rememberize.app"
    description: "CLI client for rememberize — a portable, multi-directional memory system for AI."
    license: "MIT"
    commit_author:
      name: rememberize-bot
      email: bot@captured.ventures
    install: |
      bin.install "rememberize"
    test: |
      assert_match "rememberize", shell_output("#{bin}/rememberize --version")

scoops:
  - name: rememberize
    repository:
      owner: captured-ventures
      name: scoop-rememberize
      branch: main
      token: "{{ .Env.GITHUB_TOKEN }}"
    directory: bucket
    homepage: "https://rememberize.app"
    description: "CLI client for rememberize — a portable, multi-directional memory system for AI."
    license: MIT
    commit_author:
      name: rememberize-bot
      email: bot@captured.ventures
