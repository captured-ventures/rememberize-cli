name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          # RELEASE_PAT is a classic PAT with `repo` scope, required for
          # cross-repo pushes to captured-ventures/homebrew-rememberize and
          # captured-ventures/scoop-rememberize. The default GITHUB_TOKEN
          # cannot push to other repos.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
