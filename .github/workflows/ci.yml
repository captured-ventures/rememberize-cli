name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    # `os` is the stable label that drives the job name (and the names
    # required by the main-branch ruleset). `runner` is the actual
    # runs-on value, which can change without breaking the ruleset.
    # Keep `os` literal even when migrating between runner providers.
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            runner: blacksmith-2vcpu-ubuntu-2404
          - os: macos-latest
            runner: macos-latest
          - os: windows-latest
            runner: blacksmith-4vcpu-windows-2025
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Go mod download
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -v ./...

      - name: Build
        env:
          CGO_ENABLED: "0"
        run: go build ./...

  mod-tidy:
    name: Mod Tidy Drift
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Tidy
        run: go mod tidy

      - name: Verify no drift
        run: |
          git diff --exit-code go.mod go.sum || {
            echo "::error::go.mod or go.sum is out of sync. Run 'go mod tidy' locally and commit the result."
            exit 1
          }

  goreleaser-check:
    name: GoReleaser Config
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Validate .goreleaser.yml
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check

  lint:
    name: Lint
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
